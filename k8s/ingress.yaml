# Ingress routes external HTTP/HTTPS traffic into the cluster.
# Prerequisites: kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
# For minikube: minikube addons enable ingress
#
# TLS notes:
#   - Production: install cert-manager with a Let's Encrypt ClusterIssuer
#     and the cert-manager.io/cluster-issuer annotation below will
#     auto-provision the cert into the referenced Secret.
#   - Local/minikube: comment out the spec.tls block (or generate a
#     self-signed cert into the named Secret) to keep iteration fast.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sitetrack-ingress
  namespace: sitetrack
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket upgrade needed for GraphQL subscriptions
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
    # Force HTTPS — JWT and login traffic must not ride plaintext.
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Uncomment when cert-manager is installed:
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - sitetrack.local
      secretName: sitetrack-tls
  rules:
    - host: sitetrack.local  # For minikube: add to /etc/hosts
      http:
        paths:
          # /graphql goes to the NestJS backend
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3001
          # /health goes to backend for external monitoring
          - path: /health
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 3001
          # Everything else goes to the Next.js frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 3000
