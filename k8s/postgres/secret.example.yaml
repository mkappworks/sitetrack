# postgres/secret.example.yaml
#
# This file is a TEMPLATE. The real Secret must NOT be committed.
#
# Create the real Secret out-of-tree with:
#
#   kubectl create secret generic postgres-secret -n sitetrack \
#     --from-literal=POSTGRES_DB=sitetrack \
#     --from-literal=POSTGRES_USER=sitetrack \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -base64 32)"
#
# For multi-environment workflows, use Sealed Secrets, SOPS, External
# Secrets Operator, or HashiCorp Vault. Anything committed here must
# be a placeholder that would obviously fail in production.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: sitetrack
type: Opaque
stringData:
  POSTGRES_DB: sitetrack
  POSTGRES_USER: sitetrack
  POSTGRES_PASSWORD: REPLACE_ME_PLACEHOLDER
