# backend/secret.example.yaml
#
# This file is a TEMPLATE. The real Secret must NOT be committed.
#
# Create the real Secret out-of-tree with:
#
#   kubectl create secret generic backend-secret -n sitetrack \
#     --from-literal=DB_PASSWORD="$(pbpaste)" \
#     --from-literal=JWT_SECRET="$(openssl rand -base64 48)"
#
# For multi-environment workflows, use one of:
#   - Sealed Secrets (https://github.com/bitnami-labs/sealed-secrets)
#   - SOPS + age (https://github.com/getsops/sops)
#   - External Secrets Operator (https://external-secrets.io)
#   - HashiCorp Vault + Vault Agent Injector
#
# Anything you commit here must contain ONLY placeholder values that
# would obviously fail in production.
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: sitetrack
type: Opaque
stringData:
  DB_PASSWORD: REPLACE_ME_PLACEHOLDER
  JWT_SECRET: REPLACE_ME_PLACEHOLDER
  SEED_ADMIN_EMAIL: admin@sitetrack.com
  SEED_ADMIN_PASSWORD: password123
