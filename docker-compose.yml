version: "3.9"

# Local development stack — mirrors the Kubernetes setup but simpler.
# Run: docker compose up -d
# Then visit: http://localhost:3000

services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: sitetrack
      POSTGRES_USER: sitetrack
      POSTGRES_PASSWORD: sitetrack_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sitetrack -d sitetrack"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── pgAdmin — optional but useful for DB inspection ────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@sitetrack.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools # only start with: docker compose --profile tools up

  # ── NestJS Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      target: builder # use builder stage in dev for faster rebuilds
    command: npm run dev
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: sitetrack
      DB_USER: sitetrack
      DB_PASSWORD: sitetrack_dev
      JWT_SECRET: dev-secret-change-in-production-32chars
      JWT_EXPIRES_IN: 7d
      CORS_ORIGINS: http://localhost:3000
    volumes:
      # Mount source so hot reload works
      - ./backend/src:/app/src
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      target: deps # deps stage has node_modules for dev
    command: npm run dev
    environment:
      NEXT_PUBLIC_GRAPHQL_URL: http://localhost:3001/graphql
      NEXT_PUBLIC_GRAPHQL_WS_URL: ws://localhost:3001/graphql
      NEXTAUTH_SECRET: dev-nextauth-secret-32chars-minimum
      NEXTAUTH_URL: http://localhost:3000
      BACKEND_URL: http://backend:3001
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
